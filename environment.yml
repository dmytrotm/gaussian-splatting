name: gaussian_splatting
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip>=23.0
  - pytorch=2.6.0
  - torchvision=0.21.0
  - pytorch-cuda=12.4
  - numpy>=1.26,<2.0
  - tqdm
  - plyfile
  - pillow
  - pip:
    - submodules/diff-gaussian-rasterization
    - submodules/simple-knn
    - submodules/fused-ssim
    - opencv-python
    - joblib
    - tensorboard
    - viser
    - nerfview
    - matplotlib
